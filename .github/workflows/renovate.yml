name: Renovate

# Self-hosted Renovate — the family-wide auto-bumper.
#
# Every 30 minutes, this job runs Renovate against the consumer repos
# listed in renovate-global.json. Per-repo rules (auto-merge of
# @orangecheck/* patch+minor, 1-day stability window, etc.) live in
# each repo's `renovate.json`. See RENOVATE.md for the why + how.

on:
    schedule:
        # Every 30 minutes. Fast enough that a publish lands across the
        # family within ~1 hour past its 1-day stability window.
        - cron: '*/30 * * * *'
    workflow_dispatch:
        inputs:
            logLevel:
                description: 'Log level (debug for troubleshooting)'
                required: false
                default: 'info'
            dryRun:
                description: 'Dry run (full|null) — full prints what it would do, null actually does it'
                required: false
                default: 'null'

permissions:
    contents: read

concurrency:
    group: renovate
    cancel-in-progress: false

jobs:
    renovate:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - name: Checkout
              uses: actions/checkout@v5

            # Pre-pull the Renovate image with retries. renovatebot/github-action
            # runs `docker run …/renovate:latest` with no retry, so a transient
            # ghcr.io 5xx (e.g. the 502 Bad Gateway that failed run 26809354691)
            # kills the whole scheduled job and posts a red check. `docker run`
            # uses a locally-present image without re-pulling, so pulling it here
            # first — tolerating transient registry errors — makes the job
            # resilient while preserving the always-:latest behavior.
            - name: Pre-pull Renovate image (tolerate transient ghcr.io 5xx)
              run: |
                  for attempt in 1 2 3 4 5; do
                      if docker pull ghcr.io/renovatebot/renovate:latest; then
                          exit 0
                      fi
                      echo "::warning::ghcr.io pull failed (attempt ${attempt}/5); retrying in 20s"
                      sleep 20
                  done
                  echo "::error::Renovate image pull failed after 5 attempts"
                  exit 1

            - name: Renovate
              uses: renovatebot/github-action@v40.3.0
              env:
                  LOG_LEVEL: ${{ inputs.logLevel || 'info' }}
                  RENOVATE_DRY_RUN: ${{ inputs.dryRun || 'null' }}
              with:
                  # RENOVATE_TOKEN — a fine-grained PAT (or classic PAT
                  # with `repo` scope) that has *contents:write* and
                  # *pull-requests:write* on every repo listed in
                  # renovate-global.json. See RENOVATE.md.
                  token: ${{ secrets.RENOVATE_TOKEN }}
                  configurationFile: renovate-global.json
