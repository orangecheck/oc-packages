name: Packages

# Build + test every package on push / PR.
#
# Jobs:
#   build       — build + test each JS package (matrix over every dir)
#   python      — build + test the Python SDK
#   conformance — fetch the LIVE vectors from oc-protocol/main and re-run
#                 both SDKs against them. This is the drift-catcher: if the
#                 spec moves and a vendored SDK copy hasn't caught up, this
#                 job fails.
#
# The site's CI lives in the oc-web repo (which consumes this repo as a submodule).

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

concurrency:
    group: packages-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build ${{ matrix.pkg }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                pkg:
                    - sdk
                    - gate
                    - cli
                    - react
                    - relay-filter
                    - airdrop-gate
                    - wallet-adapter
                    - lock-crypto
                    - lock-core
                    - lock-device
                    - stamp-core
                    - stamp-ots
                    - stamp-cli
                    - vote-core
                    - vote-cli
                    - vote-react
                    - pledge-core
                    - agent-core
                    - agent-signer
                    - agent-mcp
                    - agent-cli
                    - agent-anthropic
                    - agent-openai
                    - agent-vercel
                    - agent-langgraph
                    - webhook-verify
                    - me-client
                    - auth-core
                    - auth-client
                    - ui
        defaults:
            run:
                working-directory: ${{ matrix.pkg }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: yarn
                  cache-dependency-path: ${{ matrix.pkg }}/yarn.lock

            # vote-core's conformance tests load canonical fixtures from the
            # oc-vote-protocol repo. Check it out into a scratch dir then
            # point the tests at its test-vectors/ via OC_VOTE_VECTORS_DIR.
            - name: Checkout oc-vote-protocol (for vote-core conformance)
              if: matrix.pkg == 'vote-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-vote-protocol
                  path: .oc-vote-protocol

            - name: Set OC_VOTE_VECTORS_DIR for conformance test
              if: matrix.pkg == 'vote-core'
              run: echo "OC_VOTE_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-vote-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # agent-core's conformance tests load canonical fixtures from the
            # oc-agent-protocol repo. Same pattern as vote-core above.
            - name: Checkout oc-agent-protocol (for agent-core conformance)
              if: matrix.pkg == 'agent-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-agent-protocol
                  path: .oc-agent-protocol

            - name: Set OC_AGENT_VECTORS_DIR for conformance test
              if: matrix.pkg == 'agent-core'
              run: echo "OC_AGENT_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-agent-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # pledge-core's conformance tests load canonical fixtures from the
            # oc-pledge-protocol repo. Same pattern as vote-core / agent-core.
            - name: Checkout oc-pledge-protocol (for pledge-core conformance)
              if: matrix.pkg == 'pledge-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-pledge-protocol
                  path: .oc-pledge-protocol

            - name: Set OC_PLEDGE_VECTORS_DIR for conformance test
              if: matrix.pkg == 'pledge-core'
              run: echo "OC_PLEDGE_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-pledge-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # lock-core's conformance tests load canonical fixtures from the
            # oc-lock-protocol repo. Same pattern as vote-core / agent-core /
            # pledge-core. Without this step the test gracefully no-ops on CI
            # (silent conformance gap); with it, every PR exercises the
            # cross-impl byte-equality property end-to-end.
            - name: Checkout oc-lock-protocol (for lock-core conformance)
              if: matrix.pkg == 'lock-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-lock-protocol
                  path: .oc-lock-protocol

            - name: Set OC_LOCK_VECTORS_DIR for conformance test
              if: matrix.pkg == 'lock-core'
              run: echo "OC_LOCK_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-lock-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # stamp-core's conformance tests load canonical fixtures from the
            # oc-stamp-protocol repo. Same pattern.
            - name: Checkout oc-stamp-protocol (for stamp-core conformance)
              if: matrix.pkg == 'stamp-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-stamp-protocol
                  path: .oc-stamp-protocol

            - name: Set OC_STAMP_VECTORS_DIR for conformance test
              if: matrix.pkg == 'stamp-core'
              run: echo "OC_STAMP_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-stamp-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # lock-core and lock-device depend on lock-crypto via file:../lock-crypto.
            - name: Build @orangecheck/lock-crypto (dependency)
              if: matrix.pkg == 'lock-core' || matrix.pkg == 'lock-device'
              working-directory: lock-crypto
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # stamp-ots depends on stamp-core via file:../stamp-core.
            - name: Build @orangecheck/stamp-core (dependency)
              if: matrix.pkg == 'stamp-ots'
              working-directory: stamp-core
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # agent-signer and agent-mcp depend on agent-core (and, transitively,
            # stamp-core). Pull the dep-root packages from the registry (the
            # file:../ refs in package.json were swapped for ^versions on release).
            # No local build step needed since CI uses the published versions.

            # agent-mcp additionally depends on agent-signer. Nothing to build
            # locally — it resolves via npm.

            - name: Install
              run: yarn install --frozen-lockfile

            # yarn v1 doesn't support --if-present the way npm does — it
            # forwards the unknown flag to the invoked script, which vitest
            # rejects. Guard with grep against package.json instead.
            - name: Type check (if present)
              run: |
                  if grep -q '"type-check"' package.json; then
                      yarn type-check
                  else
                      echo "no type-check script; skipping"
                  fi

            - name: Build
              run: yarn build

            - name: Test (if present)
              run: |
                  if grep -q '"test":' package.json; then
                      yarn test
                  else
                      echo "no test script; skipping"
                  fi

            - name: Smoke check — dist exists
              run: test -d dist

            - name: Smoke check — LICENSE + README shipped
              run: test -f LICENSE && test -f README.md

    python:
        name: Python SDK
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            # orangecheck.pledge's conformance harness loads the canonical
            # vectors from oc-pledge-protocol/test-vectors/. Without this
            # checkout the pledge tests gracefully skip; with it, all 28
            # vectors run as part of the standard `python` CI gate.
            - name: Checkout oc-pledge-protocol (for pledge conformance)
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-pledge-protocol
                  path: .oc-pledge-protocol

            - name: Set OC_PLEDGE_VECTORS_DIR for pledge conformance
              run: echo "OC_PLEDGE_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-pledge-protocol/test-vectors" >> "$GITHUB_ENV"

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip

            - name: Install + test
              working-directory: sdk-py
              run: |
                  pip install --upgrade pip
                  pip install -e '.[dev]' pytest
                  python -m pytest -q

    conformance:
        name: Cross-impl conformance (live vectors)
        runs-on: ubuntu-latest
        # Checks that the vectors vendored in each SDK still match what
        # oc-protocol / oc-pledge-protocol publish on main. A drift here
        # means either a spec moved and the SDKs need re-vendoring, or a
        # SDK vendored a stale copy. Runs independently from the build
        # matrix so the signal is unambiguous ("spec/impl drift" vs "a
        # package doesn't build").
        #
        # Two protocol families currently share this gate:
        #   * oc-attest-protocol — sdk (TS) + sdk-py both vendor vectors;
        #     diff -r against the live spec catches re-vendoring drift.
        #   * oc-pledge-protocol — pledge-core (TS) + orangecheck.pledge
        #     (Python) both load vectors from the protocol repo at test
        #     time via OC_PLEDGE_VECTORS_DIR; no in-tree vendoring, so
        #     drift is impossible by construction. The two SDKs producing
        #     identical output for every vector IS the conformance gate.
        steps:
            - uses: actions/checkout@v4

            - name: Fetch live oc-attest-protocol vectors
              run: |
                  git clone --depth=1 https://github.com/orangecheck/oc-attest-protocol.git /tmp/oc-protocol

            - name: Fetch live oc-pledge-protocol vectors
              run: |
                  git clone --depth=1 https://github.com/orangecheck/oc-pledge-protocol.git /tmp/oc-pledge-protocol

            - name: Verify oc-attest SDK vectors are byte-identical to oc-attest-protocol/main
              run: |
                  diff -r /tmp/oc-protocol/conformance/vectors sdk/src/__tests__/vectors
                  diff -r /tmp/oc-protocol/conformance/vectors sdk-py/tests/vectors

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: yarn
                  cache-dependency-path: sdk/yarn.lock

            - name: TS — oc-attest conformance suite
              working-directory: sdk
              run: |
                  yarn install --frozen-lockfile
                  yarn build
                  yarn test

            - name: TS — pledge-core conformance suite (28 vectors, live)
              working-directory: pledge-core
              env:
                  OC_PLEDGE_VECTORS_DIR: /tmp/oc-pledge-protocol/test-vectors
              run: |
                  yarn install --frozen-lockfile
                  yarn build
                  yarn test

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip

            - name: Python — oc-attest conformance suite
              working-directory: sdk-py
              run: |
                  pip install --upgrade pip
                  pip install -e '.[dev]' pytest
                  python -m pytest tests/test_conformance.py -q

            - name: Python — orangecheck.pledge conformance suite (28 vectors, live)
              working-directory: sdk-py
              env:
                  OC_PLEDGE_VECTORS_DIR: /tmp/oc-pledge-protocol/test-vectors
              run: |
                  python -m pytest tests/pledge/test_vectors.py -q
