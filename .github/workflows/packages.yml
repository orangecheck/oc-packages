name: Packages

# Build + test every package on push / PR.
#
# Jobs:
#   build       — build + test each JS package (matrix over every dir)
#   python      — build + test the Python SDK
#   conformance — fetch the LIVE vectors from oc-protocol/main and re-run
#                 both SDKs against them. This is the drift-catcher: if the
#                 spec moves and a vendored SDK copy hasn't caught up, this
#                 job fails.
#
# The site's CI lives in the oc-web repo (which consumes this repo as a submodule).

on:
    push:
        branches: [main, develop]
    pull_request:
        branches: [main, develop]

concurrency:
    group: packages-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:
        name: Build ${{ matrix.pkg }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                pkg:
                    - sdk
                    - gate
                    - cli
                    - react
                    - relay-filter
                    - airdrop-gate
                    - wallet-adapter
                    - lock-crypto
                    - lock-core
                    - lock-device
                    - stamp-core
                    - stamp-ots
                    - vote-core
                    - vote-cli
                    - agent-core
                    - agent-signer
                    - agent-mcp
        defaults:
            run:
                working-directory: ${{ matrix.pkg }}
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: yarn
                  cache-dependency-path: ${{ matrix.pkg }}/yarn.lock

            # vote-core's conformance tests load canonical fixtures from the
            # oc-vote-protocol repo. Check it out into a scratch dir then
            # point the tests at its test-vectors/ via OC_VOTE_VECTORS_DIR.
            - name: Checkout oc-vote-protocol (for vote-core conformance)
              if: matrix.pkg == 'vote-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-vote-protocol
                  path: .oc-vote-protocol

            - name: Set OC_VOTE_VECTORS_DIR for conformance test
              if: matrix.pkg == 'vote-core'
              run: echo "OC_VOTE_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-vote-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # agent-core's conformance tests load canonical fixtures from the
            # oc-agent-protocol repo. Same pattern as vote-core above.
            - name: Checkout oc-agent-protocol (for agent-core conformance)
              if: matrix.pkg == 'agent-core'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-agent-protocol
                  path: .oc-agent-protocol

            - name: Set OC_AGENT_VECTORS_DIR for conformance test
              if: matrix.pkg == 'agent-core'
              run: echo "OC_AGENT_VECTORS_DIR=$GITHUB_WORKSPACE/.oc-agent-protocol/test-vectors" >> "$GITHUB_ENV"
              working-directory: ${{ github.workspace }}

            # lock-core and lock-device depend on lock-crypto via file:../lock-crypto.
            - name: Build @orangecheck/lock-crypto (dependency)
              if: matrix.pkg == 'lock-core' || matrix.pkg == 'lock-device'
              working-directory: lock-crypto
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # stamp-ots depends on stamp-core via file:../stamp-core.
            - name: Build @orangecheck/stamp-core (dependency)
              if: matrix.pkg == 'stamp-ots'
              working-directory: stamp-core
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # agent-signer and agent-mcp depend on agent-core (and, transitively,
            # stamp-core). Pull the dep-root packages from the registry (the
            # file:../ refs in package.json were swapped for ^versions on release).
            # No local build step needed since CI uses the published versions.

            # agent-mcp additionally depends on agent-signer. Nothing to build
            # locally — it resolves via npm.

            - name: Install
              run: yarn install --frozen-lockfile

            # yarn v1 doesn't support --if-present the way npm does — it
            # forwards the unknown flag to the invoked script, which vitest
            # rejects. Guard with grep against package.json instead.
            - name: Type check (if present)
              run: |
                  if grep -q '"type-check"' package.json; then
                      yarn type-check
                  else
                      echo "no type-check script; skipping"
                  fi

            - name: Build
              run: yarn build

            - name: Test (if present)
              run: |
                  if grep -q '"test":' package.json; then
                      yarn test
                  else
                      echo "no test script; skipping"
                  fi

            - name: Smoke check — dist exists
              run: test -d dist

            - name: Smoke check — LICENSE + README shipped
              run: test -f LICENSE && test -f README.md

    python:
        name: Python SDK
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: sdk-py
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip

            - name: Install + test
              run: |
                  pip install --upgrade pip
                  pip install -e '.[dev]' pytest
                  python -m pytest -q

    conformance:
        name: Cross-impl conformance (live vectors)
        runs-on: ubuntu-latest
        # Checks that the vectors vendored in each SDK still match what
        # oc-protocol publishes on main. A drift here means either the spec
        # moved and the SDKs need re-vendoring, or a SDK vendored a stale
        # copy. Runs independently from the build matrix so the signal is
        # unambiguous ("spec/impl drift" vs "a package doesn't build").
        steps:
            - uses: actions/checkout@v4

            - name: Fetch live oc-protocol vectors
              run: |
                  git clone --depth=1 https://github.com/orangecheck/oc-protocol.git /tmp/oc-protocol

            - name: Verify SDK vectors are byte-identical to oc-protocol/main
              run: |
                  diff -r /tmp/oc-protocol/conformance/vectors sdk/src/__tests__/vectors
                  diff -r /tmp/oc-protocol/conformance/vectors sdk-py/tests/vectors

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: yarn
                  cache-dependency-path: sdk/yarn.lock

            - name: TS conformance suite
              working-directory: sdk
              run: |
                  yarn install --frozen-lockfile
                  yarn build
                  yarn test

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip

            - name: Python conformance suite
              working-directory: sdk-py
              run: |
                  pip install --upgrade pip
                  pip install -e '.[dev]' pytest
                  python -m pytest tests/test_conformance.py -q
