name: Release

# Publish a package when a tag matching `<pkg>-v<version>` is pushed.
#
#   git tag sdk-v0.2.0 ...                → @orangecheck/sdk             (npm)
#   git tag gate-v0.1.5 ...               → @orangecheck/gate            (npm)
#   git tag cli-v0.3.0 ...                → @orangecheck/cli             (npm)
#   git tag react-v0.2.0 ...              → @orangecheck/react           (npm)
#   git tag relay-filter-v0.1.1 ...       → @orangecheck/relay-filter    (npm)
#   git tag airdrop-gate-v0.1.1 ...       → @orangecheck/airdrop-gate    (npm)
#   git tag wallet-adapter-v0.1.0 ...     → @orangecheck/wallet-adapter  (npm)
#   git tag stamp-core-v0.1.0 ...         → @orangecheck/stamp-core      (npm)
#   git tag stamp-ots-v0.1.0 ...          → @orangecheck/stamp-ots       (npm)
#   git tag pledge-core-v0.1.0 ...        → @orangecheck/pledge-core     (npm)
#   git tag me-client-v0.1.0 ...          → @orangecheck/me-client       (npm)
#   git tag ui-v0.1.0 ...                 → @orangecheck/ui              (npm)
#   git tag sdk-py-v0.1.0 ...             → orangecheck                  (PyPI)
#
# Secrets required:
#   - NPM_TOKEN for JS packages
#   - PyPI uses OIDC trusted publishing — no token needed

on:
    push:
        tags:
            - 'sdk-v*'
            - 'gate-v*'
            - 'cli-v*'
            - 'react-v*'
            - 'relay-filter-v*'
            - 'airdrop-gate-v*'
            - 'wallet-adapter-v*'
            - 'lock-crypto-v*'
            - 'lock-core-v*'
            - 'lock-device-v*'
            - 'stamp-core-v*'
            - 'stamp-ots-v*'
            - 'vote-core-v*'
            - 'vote-cli-v*'
            - 'vote-react-v*'
            - 'pledge-core-v*'
            - 'nostr-core-v*'
            - 'agent-core-v*'
            - 'agent-signer-v*'
            - 'agent-mcp-v*'
            - 'agent-cli-v*'
            - 'agent-anthropic-v*'
            - 'agent-openai-v*'
            - 'agent-vercel-v*'
            - 'agent-langgraph-v*'
            - 'webhook-verify-v*'
            - 'me-client-v*'
            - 'auth-core-v*'
            - 'auth-client-v*'
            - 'ui-v*'
            - 'sdk-py-v*'

jobs:
    # ── JS / npm ──────────────────────────────────────────────────────────
    publish-npm:
        name: Publish to npm
        runs-on: ubuntu-latest
        if: ${{ !startsWith(github.ref_name, 'sdk-py-v') }}
        permissions:
            contents: write
            id-token: write # for npm provenance
        steps:
            - uses: actions/checkout@v4

            - name: Parse tag
              id: parse
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  PKG="${TAG%-v*}"
                  VERSION="${TAG##*-v}"
                  echo "package=$PKG" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                  echo "dir=$PKG" >> "$GITHUB_OUTPUT"

            - uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  registry-url: 'https://registry.npmjs.org'
                  cache: yarn
                  cache-dependency-path: ${{ steps.parse.outputs.dir }}/yarn.lock

            # @orangecheck/sdk is the dep root for the original 7 packages.
            - name: Build SDK (dependency)
              if: steps.parse.outputs.package != 'sdk' && !startsWith(steps.parse.outputs.package, 'lock-') && !startsWith(steps.parse.outputs.package, 'stamp-')
              working-directory: sdk
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # lock-crypto is the dep root for lock-core and lock-device.
            - name: Build lock-crypto (dependency)
              if: steps.parse.outputs.package == 'lock-core' || steps.parse.outputs.package == 'lock-device'
              working-directory: lock-crypto
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # stamp-core is the dep root for stamp-ots and agent-core.
            - name: Build stamp-core (dependency)
              if: steps.parse.outputs.package == 'stamp-ots' || steps.parse.outputs.package == 'agent-core'
              working-directory: stamp-core
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # agent-core is the dep root for agent-signer and agent-mcp.
            - name: Build agent-core (dependency)
              if: steps.parse.outputs.package == 'agent-signer' || steps.parse.outputs.package == 'agent-mcp'
              working-directory: agent-core
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # agent-signer is a dep root for agent-mcp.
            - name: Build agent-signer (dependency)
              if: steps.parse.outputs.package == 'agent-mcp'
              working-directory: agent-signer
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            # auth-core is a peer dep of auth-client. Build it locally so the
            # auth-client publish doesn't have to round-trip through npm to
            # validate types when releases bundle.
            - name: Build auth-core (dependency)
              if: steps.parse.outputs.package == 'auth-client'
              working-directory: auth-core
              run: |
                  yarn install --frozen-lockfile
                  yarn build

            - name: Install
              working-directory: ${{ steps.parse.outputs.dir }}
              run: yarn install --frozen-lockfile

            - name: Verify package.json version matches tag
              working-directory: ${{ steps.parse.outputs.dir }}
              run: |
                  PJ_VERSION=$(node -p "require('./package.json').version")
                  if [ "$PJ_VERSION" != "${{ steps.parse.outputs.version }}" ]; then
                    echo "::error::package.json version ($PJ_VERSION) does not match tag version (${{ steps.parse.outputs.version }})"
                    exit 1
                  fi

            - name: Build
              working-directory: ${{ steps.parse.outputs.dir }}
              run: yarn build

            - name: Publish
              working-directory: ${{ steps.parse.outputs.dir }}
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
              # `npm publish` is used because `yarn 1.x publish` prompts for
              # 2FA interactively and --provenance requires npm CLI + OIDC.
              run: npm publish --access public --provenance

            - name: Create GitHub Release notes
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: '@orangecheck/${{ steps.parse.outputs.package }} v${{ steps.parse.outputs.version }}'
                  generate_release_notes: true

    # ── Auto-sync generated SDK docs into oc-docs ────────────────────────
    #
    # On every <pkg>-v* tag (except sdk-py): regenerate this package's
    # TypeDoc reference into a sibling oc-docs checkout, open a PR with
    # the diff. CI's Linux output is canonical — eliminates the
    # cross-platform determinism problem that made the drift-check on
    # PRs cross-platform-fragile (see docs-drift.yml advisory).
    #
    # Requires the `OC_DOCS_BOT_TOKEN` secret (fine-grained PAT scoped to
    # orangecheck/oc-docs, contents:write + pull-requests:write). When
    # the secret is absent the job skips gracefully (`if:` guard below)
    # so the workflow can ship ahead of secret provisioning.
    sync-sdk-docs:
        name: Sync /sdk/<pkg>/* to oc-docs
        runs-on: ubuntu-latest
        needs: publish-npm
        if: |
            !startsWith(github.ref_name, 'sdk-py-v')
            && !startsWith(github.ref_name, 'agent-cli-v')
            && !startsWith(github.ref_name, 'stamp-cli-v')
            && !startsWith(github.ref_name, 'vote-cli-v')
            && !startsWith(github.ref_name, 'cli-v')

        steps:
            - name: Parse tag
              id: parse
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  PKG="${TAG%-v*}"
                  VERSION="${TAG##*-v}"
                  echo "package=$PKG" >> "$GITHUB_OUTPUT"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - name: Skip if OC_DOCS_BOT_TOKEN absent
              id: gate
              env:
                  HAS_TOKEN: ${{ secrets.OC_DOCS_BOT_TOKEN != '' }}
              run: |
                  if [ "$HAS_TOKEN" = "true" ]; then
                      echo "ok=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "::warning::OC_DOCS_BOT_TOKEN not configured — skipping docs sync. Provision a fine-grained PAT scoped to orangecheck/oc-docs (contents:write + pull-requests:write) and add it as the OC_DOCS_BOT_TOKEN secret to enable auto-PR."
                      echo "ok=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Skip if package has no typedoc.json
              id: hasdocs
              if: steps.gate.outputs.ok == 'true'
              run: |
                  # Light sanity probe: if the package directory doesn't
                  # have a typedoc.json (e.g. agent-cli-style binaries),
                  # we don't generate docs for it. Belt-and-braces with
                  # the if: guard above; CLIs are listed there but other
                  # future packages might land here without docs.
                  if [ -f "${{ steps.parse.outputs.package }}/typedoc.json" ] || true ; then
                      # Can't actually probe yet — repo isn't checked out
                      # in this step. The check happens after checkout below.
                      echo "ok=true" >> "$GITHUB_OUTPUT"
                  fi

            - name: Check out oc-packages
              if: steps.gate.outputs.ok == 'true'
              uses: actions/checkout@v4
              with:
                  path: oc-packages

            - name: Check out oc-docs (with bot token)
              if: steps.gate.outputs.ok == 'true'
              uses: actions/checkout@v4
              with:
                  repository: orangecheck/oc-docs
                  ref: main
                  path: oc-docs
                  token: ${{ secrets.OC_DOCS_BOT_TOKEN }}

            - name: Skip if package has no typedoc.json (post-checkout)
              if: steps.gate.outputs.ok == 'true'
              id: pkgcheck
              working-directory: oc-packages
              run: |
                  if [ -f "${{ steps.parse.outputs.package }}/typedoc.json" ]; then
                      echo "ok=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "::notice::${{ steps.parse.outputs.package }} has no typedoc.json — not a docs-publishing package. Skipping."
                      echo "ok=false" >> "$GITHUB_OUTPUT"
                  fi

            - uses: actions/setup-node@v4
              if: steps.pkgcheck.outputs.ok == 'true'
              with:
                  node-version: '24'
                  cache: yarn
                  cache-dependency-path: oc-packages/yarn.lock

            - name: Install root devDeps
              if: steps.pkgcheck.outputs.ok == 'true'
              working-directory: oc-packages
              run: yarn install --frozen-lockfile

            - name: Regenerate docs for this package
              if: steps.pkgcheck.outputs.ok == 'true'
              working-directory: oc-packages
              run: node scripts/gen-docs.mjs ${{ steps.parse.outputs.package }}

            - name: Open / update PR in oc-docs
              if: steps.pkgcheck.outputs.ok == 'true'
              working-directory: oc-docs
              env:
                  GH_TOKEN: ${{ secrets.OC_DOCS_BOT_TOKEN }}
                  PKG: ${{ steps.parse.outputs.package }}
                  VERSION: ${{ steps.parse.outputs.version }}
              run: |
                  set -e
                  if git diff --quiet src/pages/sdk/$PKG; then
                      echo "::notice::No diff in src/pages/sdk/$PKG — skipping PR."
                      exit 0
                  fi
                  BRANCH="docs/sync-$PKG-v$VERSION"
                  git config user.name "ochk-docs-bot"
                  git config user.email "ops@ochk.io"
                  git checkout -b "$BRANCH"
                  git add src/pages/sdk/$PKG
                  git commit -m "docs(sdk): sync $PKG@$VERSION

                  Auto-generated by oc-packages release workflow on tag
                  $PKG-v$VERSION. Source: https://github.com/orangecheck/oc-packages/tree/$PKG-v$VERSION/$PKG/src

                  Co-Authored-By: ochk-docs-bot <ops@ochk.io>"
                  git push origin "$BRANCH"
                  gh pr create \
                      --title "docs(sdk): sync $PKG@$VERSION" \
                      --body "Auto-PR from oc-packages release workflow on tag \`$PKG-v$VERSION\`. Regenerated TypeDoc reference for [\`@orangecheck/$PKG\`](https://www.npmjs.com/package/@orangecheck/$PKG). Merge when CI is green; the docs.ochk.io build picks up the new pages on Vercel auto-deploy." \
                      --base main \
                      --head "$BRANCH" \
                      --label "auto" || true
                  gh pr merge "$BRANCH" --auto --squash --delete-branch || true

    # ── Python / PyPI ─────────────────────────────────────────────────────
    publish-pypi:
        name: Publish to PyPI
        runs-on: ubuntu-latest
        if: ${{ startsWith(github.ref_name, 'sdk-py-v') }}
        # The `pypi` environment holds the PYPI_API_TOKEN secret. Environment
        # protection rules in the repo settings gate who can trigger a
        # production publish (required reviewers, deployment branches).
        environment: pypi
        permissions:
            contents: write
        defaults:
            run:
                working-directory: sdk-py
        steps:
            - uses: actions/checkout@v4

            - name: Parse version
              id: parse
              run: |
                  TAG="${GITHUB_REF#refs/tags/}"
                  VERSION="${TAG##*-v}"
                  echo "version=$VERSION" >> "$GITHUB_OUTPUT"

            - uses: actions/setup-python@v5
              with:
                  python-version: '3.12'
                  cache: pip

            - name: Install build tooling
              run: pip install --upgrade pip build hatchling

            - name: Verify pyproject version matches tag
              run: |
                  PP_VERSION=$(python -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('pyproject.toml').read_text())['project']['version'])")
                  if [ "$PP_VERSION" != "${{ steps.parse.outputs.version }}" ]; then
                    echo "::error::pyproject.toml version ($PP_VERSION) does not match tag version (${{ steps.parse.outputs.version }})"
                    exit 1
                  fi

            - name: Build wheel + sdist
              run: python -m build

            - name: Publish to PyPI
              uses: pypa/gh-action-pypi-publish@release/v1
              with:
                  packages-dir: sdk-py/dist
                  password: ${{ secrets.PYPI_API_TOKEN }}
                  print-hash: true

            - name: Create GitHub Release notes
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ github.ref_name }}
                  name: 'orangecheck (Python) v${{ steps.parse.outputs.version }}'
                  generate_release_notes: true
