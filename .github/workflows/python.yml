name: Python SDK

# Tests the orangecheck Python SDK on every push / PR that touches it.

on:
    push:
        branches: [main, develop]
        paths:
            - 'sdk-py/**'
            - '.github/workflows/python.yml'
    pull_request:
        branches: [main, develop]
        paths:
            - 'sdk-py/**'
            - '.github/workflows/python.yml'

concurrency:
    group: python-${{ github.ref }}
    cancel-in-progress: true

jobs:
    test:
        name: Python ${{ matrix.python-version }}
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                python-version: ['3.9', '3.10', '3.11', '3.12', '3.13']
        defaults:
            run:
                working-directory: sdk-py
        steps:
            - uses: actions/checkout@v4

            - name: Set up Python ${{ matrix.python-version }}
              uses: actions/setup-python@v5
              with:
                  python-version: ${{ matrix.python-version }}
                  cache: pip

            - name: Install package + dev extras
              run: |
                  python -m pip install --upgrade pip
                  pip install -e '.[dev]'

            - name: Ruff lint
              run: ruff check .

            - name: Mypy
              run: mypy orangecheck

            - name: Pytest
              run: pytest -q

    # Separate release-publish workflow lives in release.yml; this one is CI only.
