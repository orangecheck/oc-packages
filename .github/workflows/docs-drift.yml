name: Docs drift check

# Fail PRs that change the public TypeScript surface (or the JSDoc/TSDoc
# attached to it) without committing the corresponding regenerated MDX in
# the sibling oc-docs repo.
#
# Mechanism:
#   1. Check out oc-packages (the PR branch).
#   2. Check out oc-docs main alongside it.
#   3. Run scripts/drift-check.mjs — regenerates docs into a temp dir and
#      diffs against oc-docs/src/pages/sdk/.
#   4. Exit 1 if drift, with a message naming offending files + the fix.
#
# Local equivalent: `yarn docs:check` from the oc-packages root, with
# oc-docs cloned as a sibling at ../oc-docs.

on:
    pull_request:
        branches: [main]
        paths:
            - '**/*.ts'
            - '**/typedoc.json'
            - 'typedoc.base.json'
            - 'scripts/gen-docs.mjs'
            - 'scripts/drift-check.mjs'
            - '.github/workflows/docs-drift.yml'
    push:
        branches: [main]
        paths:
            - '**/*.ts'
            - '**/typedoc.json'
            - 'typedoc.base.json'
            - 'scripts/gen-docs.mjs'
            - 'scripts/drift-check.mjs'
    # Manual trigger: useful after a cross-repo race (oc-packages and
    # oc-docs commits land out of order — drift-check flickers red until
    # the second repo catches up; retrigger once it has).
    workflow_dispatch:

jobs:
    drift:
        name: Regenerate docs and diff against oc-docs
        runs-on: ubuntu-latest

        steps:
            - name: Check out oc-packages
              uses: actions/checkout@v5
              with:
                  path: oc-packages

            - name: Check out oc-docs (sibling)
              uses: actions/checkout@v5
              with:
                  repository: orangecheck/oc-docs
                  ref: main
                  path: oc-docs

            # Node 24 — matches the version in oc-packages/.nvmrc, which
            # is what local contributors run via `nvm use` (or homebrew
            # node, which currently aliases to 24.x). Output of typedoc
            # is deterministic within a major Node line; pin here so a
            # CI Node bump doesn't silently drift docs.
            - uses: actions/setup-node@v5
              with:
                  node-version: '24'
                  cache: yarn
                  cache-dependency-path: oc-packages/yarn.lock

            - name: Install root devDeps (typedoc + plugins)
              working-directory: oc-packages
              run: yarn install --frozen-lockfile

            - name: Run gen-docs (capture CI's generation for diagnosis)
              working-directory: oc-packages
              run: yarn docs:gen:all

            - name: Diff against committed oc-docs tree
              id: diff
              working-directory: oc-docs
              run: |
                  git diff --stat src/pages/sdk | tee /tmp/diff-stat.txt
                  git diff src/pages/sdk > /tmp/diff-full.txt 2>&1 || true
                  if [ -s /tmp/diff-stat.txt ]; then
                      echo "drift=true" >> "$GITHUB_OUTPUT"
                  else
                      echo "drift=false" >> "$GITHUB_OUTPUT"
                  fi

            - name: Upload diff artifact
              if: steps.diff.outputs.drift == 'true'
              uses: actions/upload-artifact@v4
              with:
                  name: docs-drift-${{ github.sha }}
                  path: |
                      /tmp/diff-stat.txt
                      /tmp/diff-full.txt
                      oc-docs/src/pages/sdk

            - name: Warn (advisory) if drift
              if: steps.diff.outputs.drift == 'true'
              run: |
                  echo "::warning::Docs drift detected between regenerated TypeDoc output and the committed oc-docs/src/pages/sdk/ tree. Download the docs-drift-${{ github.sha }} artifact for the diff."
                  echo ""
                  echo "Diff stat:"
                  cat /tmp/diff-stat.txt
                  echo ""
                  echo "ADVISORY ONLY — does not fail the build. Cross-platform TypeDoc"
                  echo "output isn't yet fully deterministic (Mac vs Linux ships subtly"
                  echo "different lib.dom.d.ts which affects how 'fetch' overloads render,"
                  echo "and category classification — Variable vs Function — for some"
                  echo "exports). Phase 3.5 (auto-PR from CI on every release tag with a"
                  echo "cross-repo PAT) makes CI the canonical source-of-truth, eliminating"
                  echo "the platform-asymmetry problem at the source."
                  echo ""
                  echo "If the diff looks intentional (a real public API change), run"
                  echo "\`yarn docs:gen:all\` locally and commit the result to oc-docs."
